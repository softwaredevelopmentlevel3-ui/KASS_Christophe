<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KASS Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }

        h2 {
            color: #0056b3;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        input:focus {
            border-color: #87CEEB;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #87CEEB;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #5fb6d9;
        }

        #message {
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>REGISTRATION FORM</h2>
        <input type="text" id="username" placeholder="Enter Full Name">
        <input type="password" id="password" placeholder="Enter Password">
        <button onclick="validateForm()">Register</button>
        <div id="message"></div>
    </div>

    <script>
        function validateForm() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            const msg = document.getElementById("message");

            if (user === "" || pass === "") {
                msg.style.color = "red";
                msg.innerHTML = "Error: All fields are required!";
            } else {
                msg.style.color = "green";
                msg.innerHTML = "Success! Processing registration...";
                
                setTimeout(() => {
                    alert("Welcome to KASS, " + user);
                    window.location.reload();
                }, 1000);
            }
        }
    </script>

</body>
</html>
